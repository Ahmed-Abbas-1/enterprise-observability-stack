version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: es_core
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - observability_net

  logstash:
    image: logstash:8.12.0
    container_name: logstash_pipeline
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5000:5000/tcp"
      - "12201:12201/udp"
    depends_on:
      - elasticsearch
    networks:
      - observability_net

  kibana:
    image: kibana:8.12.0
    container_name: kibana_dashboard
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - observability_net

volumes:
  es_data:

networks:
  observability_net:
